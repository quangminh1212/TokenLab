<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Model · XLab Token</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
  <link rel="shortcut icon" href="/assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="brand-logo-wrap" href="/" title="XLab Token" aria-label="XLab Token">
          <img class="brand-logo" src="/assets/logo.png" alt="XLab Token" width="140" height="56"
            onerror="this.style.display='none'; document.querySelector('.brand-mark').style.display='flex';" />
          <div class="brand-mark" aria-hidden="true"><span class="x">X</span><span class="lab">Lab</span></div>
        </a>
      </div>
      <nav class="nav" aria-label="Main">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/agents">Agents</a>
        <a class="nav-link active" href="/model">Model</a>
        <a class="nav-link" href="/settings">Settings</a>
      </nav>
      <div class="top-actions">
        <span class="meta-chip" id="meta">Loading…</span>
        <button class="icon-btn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="shell model-page">
    <div class="usage-toolbar">
      <div>
        <h1 class="page-title">Model</h1>
        <p class="page-sub">USD / 1M tokens · custom rates override defaults</p>
      </div>
      <div class="usage-actions">
        <span class="pricing-status muted" id="pricingStatus">—</span>
        <button class="btn btn-with-icon" id="pricingReload" type="button">Reload</button>
        <button class="btn btn-primary btn-with-icon" id="pricingSave" type="button">Save</button>
      </div>
    </div>

    <section class="u-card table-card">
      <div class="model-toolbar">
        <input class="model-search" id="priceSearch" type="search" placeholder="Search model…" autocomplete="off" />
        <label class="model-check"><input type="checkbox" id="priceOnlySeen" /> Seen only</label>
        <label class="model-check"><input type="checkbox" id="priceOnlyCustom" /> Custom only</label>
      </div>
      <div class="table-scroll">
        <table class="usage-table" id="pricingTable">
          <thead>
            <tr>
              <th>Model</th>
              <th>Source</th>
              <th class="num">Input $/1M</th>
              <th class="num">Output $/1M</th>
            </tr>
          </thead>
          <tbody id="pricingBody">
            <tr><td colspan="4"><div class="empty">Loading…</div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="model-add-row">
        <input type="text" id="priceModel" placeholder="Model name" />
        <input type="number" id="priceIn" step="0.001" min="0" placeholder="In $/1M" />
        <input type="number" id="priceOut" step="0.001" min="0" placeholder="Out $/1M" />
        <button type="button" class="btn btn-primary btn-with-icon" id="priceAdd">Add</button>
      </div>
      <p class="model-path muted">Config · <code id="pricingPath">…</code></p>
    </section>

    <footer>
      <div>Model rates · apply to all agents</div>
      <div>localhost only · estimated cost, not billing</div>
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function normalizeModelName(model) {
      if (model == null) return '';
      let m = String(model).trim();
      if (!m) return '';
      for (let i = 0; i < 3; i++) {
        const next = m.replace(/\s*\([^)]*\)\s*$/g, '').trim();
        if (next === m) break;
        m = next;
      }
      m = m.replace(/\s*\[[^\]]*\]\s*$/g, '').trim();
      if (m.includes('|')) m = m.split('|')[0].trim();
      if (m.includes('/') && !m.startsWith('http')) {
        const parts = m.split('/').map((p) => p.trim()).filter(Boolean);
        const last = parts[parts.length - 1] || m;
        if (last && last.length >= 2 && !/^(models?|v\d+)$/i.test(last)) m = last;
      }
      m = m.replace(/\s+/g, ' ').replace(/[-_:|]+$/g, '').trim();
      const lower = m.toLowerCase();
      if (lower.startsWith('deep-seek')) m = 'deepseek' + m.slice('deep-seek'.length);
      if (lower.startsWith('deep_seek')) m = 'deepseek' + m.slice('deep_seek'.length);
      if (lower === 'digigo') m = 'Digigo';
      return m;
    }

    const ICONS = {
      moon: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/></svg>',
      sun: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
      reload: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
      save: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>',
      plus: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>',
    };

    function applyTheme(mode) {
      document.documentElement.classList.toggle('dark', mode === 'dark');
      localStorage.setItem('xlab-token-theme', mode);
      const btn = $('themeBtn');
      btn.innerHTML = mode === 'dark' ? ICONS.sun : ICONS.moon;
      btn.title = mode === 'dark' ? 'Light mode' : 'Dark mode';
    }
    applyTheme(localStorage.getItem('xlab-token-theme') === 'dark' ? 'dark' : 'light');
    $('pricingReload').innerHTML = ICONS.reload + '<span>Reload</span>';
    $('pricingSave').innerHTML = ICONS.save + '<span>Save</span>';
    $('priceAdd').innerHTML = ICONS.plus + '<span>Add</span>';
    $('themeBtn').onclick = () => {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    };

    let pricingDraft = {};
    let pricingMeta = { catalog: [], seenModels: [], customRates: {} };
    let scanPollTimer = 0;

    function setStatus(text) {
      $('pricingStatus').textContent = text;
    }

    function renderPricing() {
      const q = ($('priceSearch').value || '').trim().toLowerCase();
      const onlyCustom = $('priceOnlyCustom').checked;
      let onlySeen = $('priceOnlySeen').checked;
      const seenList = pricingMeta.seenModels || [];
      const seenSet = new Set(seenList.map((m) => String(m).toLowerCase()));
      // Avoid empty white table when cache has no usage yet
      if (onlySeen && seenSet.size === 0) onlySeen = false;
      const custom = pricingMeta.customRates || {};
      const catMap = new Map((pricingMeta.catalog || []).map((c) => [String(c.model).toLowerCase(), c]));

      let models = [
        ...new Set([
          ...seenList,
          ...Object.keys(custom),
          ...Object.keys(pricingDraft),
          ...(pricingMeta.catalog || []).map((c) => c.model),
        ]),
      ].filter(Boolean);

      models = models.filter((model) => {
        const key = model.toLowerCase();
        if (q && !key.includes(q)) return false;
        if (onlyCustom && !custom[key] && !pricingDraft[key]) return false;
        if (onlySeen && !seenSet.has(key) && !pricingDraft[key]) return false;
        return true;
      });

      models.sort((a, b) => {
        const as = seenSet.has(a.toLowerCase()) ? 0 : 1;
        const bs = seenSet.has(b.toLowerCase()) ? 0 : 1;
        if (as !== bs) return as - bs;
        return a.localeCompare(b);
      });

      if (!models.length) {
        $('pricingBody').innerHTML = '<tr><td colspan="4"><div class="empty">No models. Scan usage or add a rate below.</div></td></tr>';
        return;
      }

      $('pricingBody').innerHTML = models.map((model) => {
        const cat = catMap.get(model.toLowerCase()) || {};
        const draft = pricingDraft[model.toLowerCase()];
        const cust = custom[model.toLowerCase()];
        const src = draft ? 'draft' : cust ? 'custom' : (cat.source || 'bundled');
        const input = draft?.inputPer1M ?? cust?.inputPer1M ?? cat.inputPer1M ?? 0;
        const output = draft?.outputPer1M ?? cust?.outputPer1M ?? cat.outputPer1M ?? 0;
        const safe = escapeHtml(model);
        return `<tr data-model="${safe}">
          <td><code title="${safe}">${safe}</code></td>
          <td class="muted">${escapeHtml(src)}</td>
          <td class="num"><input class="price-input" data-field="in" data-model="${safe}" type="number" step="0.001" min="0" value="${Number(input)}" /></td>
          <td class="num"><input class="price-input" data-field="out" data-model="${safe}" type="number" step="0.001" min="0" value="${Number(output)}" /></td>
        </tr>`;
      }).join('');
    }

    async function loadMeta() {
      try {
        const health = await fetch('/api/health').then((r) => r.json());
        const n = health.agentsDetected?.length || 0;
        const scanHint = health.scanning ? ' · scanning…' : '';
        $('meta').textContent = `v${health.version} · ${n} agents · ${health.eventCount || 0} events${scanHint}`;
        if (health.scanning || (health.eventCount || 0) === 0 && (health.scanRevision || 0) === 0) {
          if (scanPollTimer) clearTimeout(scanPollTimer);
          scanPollTimer = setTimeout(() => {
            void loadMeta();
            void loadPricing();
          }, 1200);
        }
      } catch {
        $('meta').innerHTML = '<span class="err">API offline</span>';
      }
    }

    async function loadPricing() {
      try {
        const data = await fetch('/api/pricing').then((r) => r.json());
        pricingMeta = data;
        $('pricingPath').textContent = data.configPath || 'config.json';
        renderPricing();
        setStatus(`${(data.catalog || []).length} models · ${Object.keys(data.customRates || {}).length} custom`);
      } catch {
        setStatus('Load failed');
        $('pricingBody').innerHTML = '<tr><td colspan="4"><div class="empty">Failed to load rates</div></td></tr>';
      }
    }

    function collectDraftFromTable() {
      $('pricingBody').querySelectorAll('tr[data-model]').forEach((tr) => {
        const model = (tr.getAttribute('data-model') || '').toLowerCase();
        if (!model) return;
        pricingDraft[model] = {
          inputPer1M: Number(tr.querySelector('[data-field="in"]')?.value) || 0,
          outputPer1M: Number(tr.querySelector('[data-field="out"]')?.value) || 0,
        };
      });
    }

    let liveTimer = null;
    let liveSaving = false;
    let liveQueued = false;

    async function pushRatesLive(opts = {}) {
      const { manual = false } = opts;
      if (liveSaving) {
        liveQueued = true;
        return;
      }
      collectDraftFromTable();
      const customRates = { ...(pricingMeta.customRates || {}), ...pricingDraft };
      liveSaving = true;
      if (manual) $('pricingSave').disabled = true;
      setStatus(manual ? 'Saving…' : 'Updating…');
      try {
        const res = await fetch('/api/pricing', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customRates, replace: true, live: !manual }),
        }).then((r) => r.json());
        pricingDraft = {};
        pricingMeta.customRates = res.customRates || {};
        setStatus(manual
          ? `Saved · ${Object.keys(res.customRates || {}).length} custom`
          : `Live · ${Object.keys(res.customRates || {}).length} custom`);
        const data = await fetch('/api/pricing').then((r) => r.json());
        pricingMeta = data;
        renderPricing();
      } catch {
        setStatus(manual ? 'Save failed' : 'Update failed');
      } finally {
        liveSaving = false;
        if (manual) $('pricingSave').disabled = false;
        if (liveQueued) {
          liveQueued = false;
          void pushRatesLive({ manual: false });
        }
      }
    }

    function scheduleLivePush() {
      if (liveTimer) clearTimeout(liveTimer);
      liveTimer = setTimeout(() => void pushRatesLive({ manual: false }), 450);
    }

    $('pricingBody').addEventListener('input', (e) => {
      const inp = e.target.closest('.price-input');
      if (!inp) return;
      const model = (inp.getAttribute('data-model') || '').toLowerCase();
      if (!model) return;
      const tr = inp.closest('tr');
      pricingDraft[model] = {
        inputPer1M: Number(tr.querySelector('[data-field="in"]')?.value) || 0,
        outputPer1M: Number(tr.querySelector('[data-field="out"]')?.value) || 0,
      };
      setStatus('Typing…');
      scheduleLivePush();
    });
    $('pricingBody').addEventListener('change', (e) => {
      if (e.target.closest('.price-input')) scheduleLivePush();
    });

    $('priceSearch').oninput = renderPricing;
    $('priceOnlyCustom').onchange = renderPricing;
    $('priceOnlySeen').onchange = renderPricing;

    $('priceAdd').onclick = () => {
      const model = normalizeModelName($('priceModel').value) || $('priceModel').value.trim();
      if (!model) return;
      pricingDraft[model.toLowerCase()] = {
        inputPer1M: Number($('priceIn').value) || 0,
        outputPer1M: Number($('priceOut').value) || 0,
      };
      $('priceModel').value = '';
      $('priceIn').value = '';
      $('priceOut').value = '';
      renderPricing();
      scheduleLivePush();
    };

    $('pricingReload').onclick = async () => {
      if (liveTimer) clearTimeout(liveTimer);
      pricingDraft = {};
      await loadPricing();
      setStatus('Reloaded');
    };

    $('pricingSave').onclick = async () => {
      if (liveTimer) clearTimeout(liveTimer);
      await pushRatesLive({ manual: true });
    };

    try {
      const es = new EventSource('/api/pricing/stream');
      es.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'scan' && msg.reason === 'complete') {
            void loadMeta();
            void loadPricing();
          }
        } catch { /* ignore */ }
      };
    } catch { /* ignore */ }

    loadMeta();
    loadPricing();
  </script>
</body>
</html>
