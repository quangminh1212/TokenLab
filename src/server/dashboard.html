<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · XLab Token</title>
  <link rel="icon" type="image/png" href="/assets/favicon-32x32.png" />
  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="brand-logo-wrap" href="/" title="XLab Token" aria-label="XLab Token">
          <img class="brand-logo" src="/assets/logo.png" alt="XLab Token" width="140" height="56"
            onerror="this.style.display='none'; document.querySelector('.brand-mark').style.display='flex';" />
          <div class="brand-mark" aria-hidden="true"><span class="x">X</span><span class="lab">Lab</span></div>
        </a>
      </div>
      <nav class="nav" aria-label="Main">
        <a class="nav-link active" href="/">Dashboard</a>
        <a class="nav-link" href="/agents">Agents</a>
      </nav>
      <div class="top-actions">
        <span class="meta-chip" id="meta">Loading…</span>
        <button class="icon-btn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme">☾</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <h2>Usage dashboard</h2>
        <p>Token totals, estimated cost, and breakdown by agent / model / day.</p>
      </div>
      <div class="toolbar" style="margin:0">
        <button class="btn" id="refresh" type="button">Refresh</button>
        <button class="btn btn-primary" id="scan" type="button">Rescan</button>
      </div>
    </section>

    <div class="toolbar">
      <select id="since" aria-label="Time range">
        <option value="24h">Last 24h</option>
        <option value="7d" selected>Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="">All time</option>
      </select>
      <select id="groupBy" aria-label="Group by">
        <option value="agent" selected>By agent</option>
        <option value="model">By model</option>
        <option value="day">By day</option>
      </select>
    </div>

    <div class="grid-kpi" id="kpis"></div>

    <section class="card block">
      <div class="section-head">
        <h3>Breakdown</h3>
        <span class="pill" id="sortLabel">sorted by cost</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Tokens</th>
            <th>Cost (USD)</th>
            <th>Share</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <footer>
      <div>Màu &amp; logo từ <strong>XLab Web</strong> · primary <strong>#00A19A</strong></div>
      <div>localhost only · no cloud billing APIs</div>
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => {
      if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(Math.round(n || 0));
    };
    const money = (n) => '$' + (n || 0).toFixed(4);
    function escapeHtml(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function applyTheme(mode) {
      document.documentElement.classList.toggle('dark', mode === 'dark');
      localStorage.setItem('xlab-token-theme', mode);
      $('themeBtn').textContent = mode === 'dark' ? '☀' : '☾';
      $('themeBtn').title = mode === 'dark' ? 'Light mode' : 'Dark mode';
    }
    applyTheme(localStorage.getItem('xlab-token-theme') === 'dark' ? 'dark' : 'light');
    $('themeBtn').onclick = () => {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    };

    function kpi(label, value, hint) {
      return `<div class="card kpi">
        <div class="label"><span class="dot"></span>${label}</div>
        <div class="value">${value}</div>
        ${hint ? `<div class="hint">${hint}</div>` : ''}
      </div>`;
    }

    async function load() {
      const since = $('since').value;
      const groupBy = $('groupBy').value;
      const q = new URLSearchParams({ groupBy, sort: 'cost' });
      if (since) q.set('since', since);
      try {
        const [stats, health] = await Promise.all([
          fetch('/api/stats?' + q).then((r) => r.json()),
          fetch('/api/health').then((r) => r.json()),
        ]);
        const t = stats.totals || {};
        const detected = health.agentsDetected?.length || 0;
        $('meta').textContent = `v${health.version} · ${detected} agents · ${fmt(health.eventCount || 0)} events`;
        $('kpis').innerHTML = [
          kpi('Total tokens', fmt(t.totalTokens || 0), 'input + output + cache'),
          kpi('Input', fmt(t.inputTokens || 0)),
          kpi('Output', fmt(t.outputTokens || 0)),
          kpi('Est. cost', money(t.estimatedCost || 0), 'USD · model rates'),
          kpi('Events', fmt(t.eventCount || 0), 'usage records'),
        ].join('');

        const groups = stats.groups || [];
        const maxCost = Math.max(1, ...groups.map((g) => g.estimatedCost || 0));
        $('rows').innerHTML = groups.map((g) => `
          <tr>
            <td><code>${escapeHtml(g.key)}</code></td>
            <td>${fmt(g.totalTokens || 0)}</td>
            <td><strong>${money(g.estimatedCost || 0)}</strong></td>
            <td><div class="bar"><i style="width:${Math.round(((g.estimatedCost || 0) / maxCost) * 100)}%"></i></div></td>
          </tr>
        `).join('') || '<tr><td colspan="4"><div class="empty">Chưa có usage. Dùng AI agents rồi bấm Rescan.</div></td></tr>';
      } catch (e) {
        $('meta').innerHTML = '<span class="err">Failed to load API</span>';
      }
    }

    $('refresh').onclick = load;
    $('since').onchange = load;
    $('groupBy').onchange = load;
    $('scan').onclick = async () => {
      $('scan').disabled = true;
      $('scan').textContent = 'Scanning…';
      try {
        await fetch('/api/scan', { method: 'POST' });
        await load();
      } finally {
        $('scan').disabled = false;
        $('scan').textContent = 'Rescan';
      }
    };
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
